# KumpeCloud Auth production stack for kumpeapps-deploy-bot.
#
# Required host environment variables (map via prod.yml env_mappings):
#   POSTGRES_PASSWORD Postgres password for the auth database
#   AUTH_ENDPOINT       Public OIDC/API URL
#   ADMIN_ENDPOINT      Public admin console URL
#
# Image tags:
#   stable  Latest semver release (updated when you push a version tag, e.g. v1.2.3)
#   edge    Rolling build from main (used by staging)
#
# Optional:
#   KUMPECLOUD_AUTH_TAG  Override image tag (default: stable)
#   PRIVATE_KEY_ROTATION_GRACE_PERIOD  OIDC key rotation grace period in seconds

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    user: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: logto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d logto']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  kumpecloud-auth:
    image: ghcr.io/kumpecloud/kumpecloud-auth:${KUMPECLOUD_AUTH_TAG:-stable}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nebula_client:
        condition: service_started
    ports:
      # Caddy reverse-proxies to the VM/Nebula IP on these ports.
      - '3001:3001'
      - '3002:3002'
    environment:
      TRUST_PROXY_HEADER: '1'
      DEV_FEATURES_ENABLED: '1'
      DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/logto
      ENDPOINT: ${AUTH_ENDPOINT:?AUTH_ENDPOINT is required}
      ADMIN_ENDPOINT: ${ADMIN_ENDPOINT:?ADMIN_ENDPOINT is required}
      ALL_YES: '1'
      NO_INQUIRY: '0'
      PRIVATE_KEY_ROTATION_GRACE_PERIOD: ${PRIVATE_KEY_ROTATION_GRACE_PERIOD:-}
      SECRET_VAULT_KEK: ${SECRET_VAULT_KEK:-}
    entrypoint:
      - sh
      - -c
      - npm run cli db seed -- --swe --dapc && npm run cli db alteration deploy latest && npm run cli db alteration deploy next && exec npm start
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://127.0.0.1:3001/api/status").then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))',
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

volumes:
  postgres_data:
