# Staging deployment for KumpeCloud Auth

deployment_type: docker
assigned_username: justinkumpe
vm_hostname: stage-vm-kumpecloud-auth

authorized_admins:
  - github.repo.admins

domains:
  - auth.stage.kumpe.app
  - auth-console.stage.kumpe.app

docker_compose: docker-compose.yml
plan_name: small-ai
# Deploy bot skips nebula_client during compose up (--no-deps) to avoid disrupting VPN;
# start it after app services are up (same compose file, injected at deploy time).
post_deploy_hook: 'DOCKER_CONFIG="$(pwd)/.docker" docker compose up -d --no-deps nebula_client'
env_mappings:
  NEBULA_CLIENT_TOKEN: STAGE_NEBULA_CLIENT_TOKEN
  POSTGRES_PASSWORD: STAGE_AUTH_POSTGRES_PASSWORD
  SECRET_VAULT_KEK: STAGE_SECRET_VAULT_KEK

deploy_rules:
  - environment: stage
    branches:
      include:
        - main
        - master
