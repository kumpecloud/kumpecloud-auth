services:
  - type: web
    name: kumpecloud-auth
    env: docker
    repo: https://github.com/kumpecloud/kumpecloud-auth.git
    region: oregon
    branch: master
    envVars:
      - key: ENDPOINT
        value: true
      - key: TRUST_PROXY_HEADER
        value: true
      - key: NO_INQUIRY
        value: 0
      - key: ALL_YES
        value: 1
      - key: DB_URL_DEFAULT
        fromDatabase:
          name: kumpecloud-auth-database
          property: connectionString

databases:
  - name: kumpecloud-auth-database
    databaseName: logto
    ipAllowList: []
