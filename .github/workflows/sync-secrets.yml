name: Sync Secrets to Deployment Bot

# This workflow automatically syncs repository secrets to the deployment bot.
# The action will sync ALL secrets passed as environment variables, regardless
# of what's in your deployment config.
#
# Behavior:
# - ALL secrets passed in the env section are synced to the bot
# - You don't need to maintain a list of which secrets each config needs
# - The bot will use the appropriate secrets based on each deployment config's env_mappings
#
# Staging auth password (STAGE_AUTH_POSTGRES_PASSWORD) is loaded from a 1Password Environment via
# `op environment read` (requires CLI 2.33.0-beta.02+; we install latest-beta).
# Staging URLs are hardcoded in `.kumpeapps-deploy-bot/stage/docker-compose.yml`.
# GitHub repository secrets required:
#   OP_SERVICE_ACCOUNT_TOKEN - 1Password service account token with read access to the Environment
#   ENVIRONMENT_ID           - 1Password Environment ID (Developer > Environments)
#
# The KUMPEAPPS_DEPLOY_BOT_TOKEN is automatically created by the bot when
# the GitHub App is installed on your repository.

on:
  workflow_dispatch: # Manual trigger
  push:
    branches: [main, develop, master]
    paths:
      - '.kumpeapps-deploy-bot/**/*.yml'
      - '.github/workflows/sync-secrets.yml'

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v4
        with:
          version: latest-beta

      - name: Load staging secrets from 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENVIRONMENT_ID: ${{ secrets.ENVIRONMENT_ID }}
        run: |
          set -euo pipefail

          if [ -z "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]; then
            echo "::error::Missing GitHub secret OP_SERVICE_ACCOUNT_TOKEN. Create a 1Password service account with read access to the staging Environment, then add its token as repository secret OP_SERVICE_ACCOUNT_TOKEN."
            exit 1
          fi

          if [ -z "${OP_ENVIRONMENT_ID:-}" ]; then
            echo "::error::Missing GitHub secret ENVIRONMENT_ID. Copy it from 1Password: Developer > Environments > Manage environment > Copy environment ID."
            exit 1
          fi

          required=(STAGE_AUTH_POSTGRES_PASSWORD)
          env_output="$(op environment read "$OP_ENVIRONMENT_ID")"

          declare -A loaded=()
          while IFS= read -r line || [ -n "$line" ]; do
            [ -z "$line" ] && continue
            loaded["${line%%=*}"]="${line#*=}"
          done <<< "$env_output"

          for name in "${required[@]}"; do
            value="${loaded[$name]:-}"
            # Trim accidental whitespace/newlines from 1Password values.
            value="$(printf '%s' "$value" | tr -d '\r\n')"
            if [ -z "$value" ]; then
              echo "::error::Missing 1Password Environment variable: $name"
              exit 1
            fi
            {
              echo "${name}<<EOF"
              printf '%s' "$value"
              echo
              echo "EOF"
            } >> "$GITHUB_ENV"
          done

      - name: Sync secrets to deployment bot
        uses: kumpeapps/kumpeapps-deployment-bot@main
        env:
          # Bot token (auto-created when GitHub App is installed)
          KUMPEAPPS_DEPLOY_BOT_TOKEN: ${{ secrets.KUMPEAPPS_DEPLOY_BOT_TOKEN }}

          # All your application secrets - just pass them all here.
          # The action syncs everything you pass, and each deployment config
          # will use only the secrets it needs via its env_mappings section.

          # Development environment secrets
          DEV_NEBULA_CLIENT_TOKEN: ${{ secrets.DEV_NEBULA_CLIENT_TOKEN }}

          # Staging environment secrets
          STAGE_NEBULA_CLIENT_TOKEN: ${{ secrets.STAGE_NEBULA_CLIENT_TOKEN }}
          STAGE_AUTH_POSTGRES_PASSWORD: ${{ env.STAGE_AUTH_POSTGRES_PASSWORD }}
          STAGE_AUTH_ADMIN_ENDPOINT: ${{ env.STAGE_AUTH_ADMIN_ENDPOINT }}
          STAGE_AUTH_ENDPOINT: ${{ env.STAGE_AUTH_ENDPOINT }}
          # Production environment secrets
          PROD_NEBULA_CLIENT_TOKEN: ${{ secrets.PROD_NEBULA_CLIENT_TOKEN }}
          PROD_AUTH_POSTGRES_PASSWORD: ${{ env.PROD_AUTH_POSTGRES_PASSWORD }}
          PROD_AUTH_ADMIN_ENDPOINT: ${{ env.PROD_AUTH_ADMIN_ENDPOINT }}
          PROD_AUTH_ENDPOINT: ${{ env.PROD_AUTH_ENDPOINT }}
          SECRET_VAULT_KEK_KEY: ${{ env.SECRET_VAULT_KEK_KEY }}

          # Add your other application secrets below:
          # DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          # API_KEY: ${{ secrets.API_KEY }}
